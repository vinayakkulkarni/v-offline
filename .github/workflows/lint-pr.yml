name: Lint PR

on:
  workflow_call:

permissions:
  pull-requests: write

jobs:
  validate-pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: amannn/action-semantic-pull-request@v6
        id: lint_pr_title
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            doesn't match the configured pattern. Please ensure the subject
            starts with a lowercase letter, not uppercase.

      - uses: marocchino/sticky-pull-request-comment@v3
        if: always() && (steps.lint_pr_title.outputs.error_message != null)
        with:
          header: pr-title-lint-error
          message: |
            ### ❌ Invalid PR title

            PR titles must follow the [Conventional Commits](https://www.conventionalcommits.org/en/v1.0.0/) spec.

            **Error:**
            ```
            ${{ steps.lint_pr_title.outputs.error_message }}
            ```

            **Valid examples:**
            - `feat: add hero section`
            - `fix: correct typo in contact form`
            - `chore: format and lint`
            - `feat(ui): add Button component`
            - `refactor!: drop Node.js 16 support`

      - uses: marocchino/sticky-pull-request-comment@v3
        if: steps.lint_pr_title.outputs.error_message == null
        with:
          header: pr-title-lint-error
          delete: true
