name: 'Doctor'

on:
  workflow_call:

permissions:
  contents: read

jobs:
  doctor:
    name: 'Vue Doctor'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Audit with vue-doctor
        uses: geoql/doctor-action@v1
        with:
          framework: vue
          threshold: ${{ vars.DOCTOR_THRESHOLD || '70' }}
          fail-on: error
